name: CI

on:
  push:
    branches: [main, 'v*', 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, 'v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Format / Lint / Spell (pnpm check)
        run: pnpm check

      - name: Tests (vitest)
        run: pnpm test

      - name: Build (tsdown)
        run: pnpm build
